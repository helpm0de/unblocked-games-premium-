<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXUSPLAY — Unblocked Games</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── HEADER ── -->
  <header id="header">
    <div class="logo" id="logo-link">NEXUS<span>PLAY</span></div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Search games..." autocomplete="off" spellcheck="false" />
    </div>
    <div class="header-right">
      <button class="fav-btn-header" id="fav-toggle">♥ Favorites (0)</button>
      <span class="game-count-badge" id="header-total"></span>
    </div>
  </header>

  <!-- ── LAYOUT ── -->
  <div id="layout">

    <!-- ── SIDEBAR ── -->
    <aside id="sidebar"></aside>

    <!-- ── MAIN ── -->
    <main id="main">

      <!-- Featured -->
      <div class="section-header">
        <div class="section-title">🔥 Featured</div>
        <div class="section-line"></div>
      </div>
      <div id="featured-banner"></div>

      <!-- All Games -->
      <div class="section-header">
        <div class="section-title">🎮 All Games</div>
        <div class="section-line"></div>
        <div class="section-count" id="section-count">0 games</div>
      </div>

      <div id="game-grid"></div>

      <div id="no-results">
        <div class="no-res-icon">🔎</div>
        <h3>No games found</h3>
        <p>Try a different search or category.</p>
      </div>

    </main>
  </div>

  <!-- ── FOOTER ── -->
  <footer id="footer">
    NEXUSPLAY &nbsp;·&nbsp; Unblocked Games &nbsp;·&nbsp; Play anywhere, anytime
  </footer>

  <!-- ── GAME MODAL ── -->
  <div id="game-modal">
    <div class="modal-header">
      <span class="modal-emoji" id="modal-emoji">🎮</span>
      <span class="modal-title" id="modal-title">Game</span>
      <span class="modal-cat-badge" id="modal-cat">category</span>
      <button class="modal-btn" id="fullscreen-btn" title="Fullscreen">⛶</button>
      <button class="modal-btn close-btn" id="close-modal" title="Close (Esc)">✕</button>
    </div>

    <div class="iframe-loading" id="iframe-loading">
      <div class="loader-ring"></div>
      <div class="loader-text">LOADING...</div>
    </div>

    <iframe
      id="game-iframe"
      allowfullscreen
      allow="fullscreen; autoplay; encrypted-media"
      sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-pointer-lock allow-top-navigation"
    ></iframe>
  </div>

  <!-- ── TOAST ── -->
  <div id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
